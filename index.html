<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fall 2026 Renewal Progress</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens ────────────────────────────────────── */
  :root {
    --red      : #BD1F2D;
    --red-light: #FAEAEC;
    --red-mid  : #e8707a;
    --green    : #1a9e5c;
    --green-mid: #4cc98a;
    --green-bg : #eafaf3;
    --ink      : #1a1a2e;
    --muted    : #6b7280;
    --border   : #e5e7eb;
    --white    : #ffffff;
    --fill-spd : 1.6s;
  }

  /* ── Reset & base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background  : var(--white);
    color       : var(--ink);
    min-height  : 100vh;
    display     : flex;
    flex-direction: column;
    align-items : center;
    padding     : 28px 20px 36px;
    gap         : 0;
  }

  /* ── Header ───────────────────────────────────────────── */
  header {
    width      : 100%;
    max-width  : 620px;
    text-align : center;
    margin-bottom: 6px;
  }

  .logo-bar {
    display        : flex;
    align-items    : center;
    justify-content: center;
    gap            : 9px;
    margin-bottom  : 14px;
  }

  .logo-dot {
    width         : 11px;
    height        : 11px;
    border-radius : 50%;
    background    : var(--red);
  }

  .logo-wordmark {
    font-family  : 'DM Serif Display', serif;
    font-size    : 15px;
    letter-spacing: 0.08em;
    color        : var(--red);
    text-transform: uppercase;
  }

  h1 {
    font-family  : 'DM Serif Display', serif;
    font-size    : clamp(20px, 4vw, 26px);
    color        : var(--ink);
    line-height  : 1.2;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size  : 13px;
    color      : var(--muted);
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* ── Divider ──────────────────────────────────────────── */
  .divider {
    width        : 100%;
    max-width    : 620px;
    height       : 1px;
    background   : var(--border);
    margin       : 20px 0;
  }

  /* ── Thermometer grid ─────────────────────────────────── */
  .thermo-grid {
    display        : flex;
    gap            : 40px;
    justify-content: center;
    align-items    : flex-end;
    flex-wrap      : wrap;
    width          : 100%;
    max-width      : 620px;
  }

  /* ── Individual thermometer ───────────────────────────── */
  .thermo-wrap {
    display       : flex;
    flex-direction: column;
    align-items   : center;
    gap           : 0;
    flex          : 1 1 200px;
    max-width     : 240px;
  }

  /* Top label: current value */
  .thermo-current {
    font-family  : 'DM Serif Display', serif;
    font-size    : clamp(22px, 5vw, 30px);
    color        : var(--green);
    line-height  : 1;
    margin-bottom: 4px;
    transition   : opacity 0.4s;
  }

  .thermo-current.loading { opacity: 0.3; }

  .thermo-pct {
    font-size    : 12px;
    font-weight  : 600;
    color        : var(--green);
    letter-spacing: 0.06em;
    margin-bottom: 14px;
    transition   : opacity 0.4s;
  }

  /* SVG tube */
  .thermo-svg-wrap {
    position: relative;
    width   : 100%;
    display : flex;
    justify-content: center;
  }

  /* Scale ticks on the right */
  .tick-labels {
    position: absolute;
    right   : calc(50% - 58px);
    top     : 0;
    height  : 100%;
    display : flex;
    flex-direction: column;
    justify-content: space-between;
    padding : 8px 0 44px;
  }

  .tick-label {
    font-size  : 10px;
    color      : var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }

  /* Bottom label: target */
  .thermo-target {
    margin-top : 12px;
    font-size  : 12px;
    color      : var(--muted);
    font-weight: 500;
    text-align : center;
  }

  .thermo-target strong {
    color      : var(--ink);
    font-weight: 600;
  }

  /* Metric title */
  .thermo-title {
    margin-top   : 10px;
    font-size    : 13px;
    font-weight  : 600;
    color        : var(--red);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align   : center;
  }

  /* ── Footer ───────────────────────────────────────────── */
  .as-of {
    margin-top : 28px;
    font-size  : 11px;
    color      : var(--muted);
    text-align : center;
  }

  .error-msg {
    color      : var(--red);
    font-size  : 13px;
    text-align : center;
    margin-top : 20px;
    display    : none;
  }

  /* ── Loading shimmer ──────────────────────────────────── */
  @keyframes shimmer {
    0%   { opacity: 0.4; }
    50%  { opacity: 0.9; }
    100% { opacity: 0.4; }
  }
  .shimmer { animation: shimmer 1.4s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <div class="logo-bar">
    <div class="logo-dot"></div>
    <span class="logo-wordmark">Hypothesis</span>
    <div class="logo-dot"></div>
  </div>
  <h1>Fall 2026 Renewal Progress</h1>
  <p class="subtitle">Apr 1 – Sep 30, 2026 &nbsp;·&nbsp; Team Total</p>
</header>

<div class="divider"></div>

<div class="thermo-grid">

  <!-- ARR Thermometer -->
  <div class="thermo-wrap" id="arr-wrap">
    <div class="thermo-current shimmer" id="arr-current">$0</div>
    <div class="thermo-pct shimmer"    id="arr-pct">0% of target</div>
    <div class="thermo-svg-wrap">
      <div class="tick-labels" id="arr-ticks"></div>
      <svg id="arr-svg" width="90" height="320" viewBox="0 0 90 320" xmlns="http://www.w3.org/2000/svg">
        <!-- tube body shadow -->
        <ellipse cx="45" cy="278" rx="22" ry="7" fill="rgba(0,0,0,0.07)"/>
        <!-- tube body bg -->
        <rect x="27" y="12" width="36" height="260" rx="18" fill="#f3f4f6"/>
        <rect x="27" y="12" width="36" height="260" rx="18"
              fill="none" stroke="#d1d5db" stroke-width="1.5"/>
        <!-- fill clip -->
        <clipPath id="arr-clip">
          <rect x="27" y="12" width="36" height="260" rx="18"/>
        </clipPath>
        <!-- fill bar — height animated via JS -->
        <rect id="arr-fill"
              x="27" y="272" width="36" height="0" rx="0"
              fill="url(#green-grad)" clip-path="url(#arr-clip)"/>
        <!-- bulb -->
        <circle cx="45" cy="285" r="20" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
        <circle id="arr-bulb" cx="45" cy="285" r="15" fill="#e5e7eb"/>
        <!-- tick lines -->
        <line x1="27" y1="62"  x2="22" y2="62"  stroke="#d1d5db" stroke-width="1"/>
        <line x1="27" y1="112" x2="22" y2="112" stroke="#d1d5db" stroke-width="1"/>
        <line x1="27" y1="162" x2="22" y2="162" stroke="#d1d5db" stroke-width="1"/>
        <line x1="27" y1="212" x2="22" y2="212" stroke="#d1d5db" stroke-width="1"/>
        <!-- gradient def -->
        <defs>
          <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#4cc98a"/>
            <stop offset="100%" stop-color="#1a9e5c"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="thermo-target" id="arr-target">Target: <strong>$1,968,095</strong></div>
    <div class="thermo-title">ARR Closed Won</div>
  </div>

  <!-- Deal Count Thermometer -->
  <div class="thermo-wrap" id="deal-wrap">
    <div class="thermo-current shimmer" id="deal-current">0</div>
    <div class="thermo-pct shimmer"    id="deal-pct">0% of target</div>
    <div class="thermo-svg-wrap">
      <div class="tick-labels" id="deal-ticks"></div>
      <svg id="deal-svg" width="90" height="320" viewBox="0 0 90 320" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="45" cy="278" rx="22" ry="7" fill="rgba(0,0,0,0.07)"/>
        <rect x="27" y="12" width="36" height="260" rx="18" fill="#f3f4f6"/>
        <rect x="27" y="12" width="36" height="260" rx="18"
              fill="none" stroke="#d1d5db" stroke-width="1.5"/>
        <clipPath id="deal-clip">
          <rect x="27" y="12" width="36" height="260" rx="18"/>
        </clipPath>
        <rect id="deal-fill"
              x="27" y="272" width="36" height="0" rx="0"
              fill="url(#green-grad2)" clip-path="url(#deal-clip)"/>
        <circle cx="45" cy="285" r="20" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
        <circle id="deal-bulb" cx="45" cy="285" r="15" fill="#e5e7eb"/>
        <line x1="27" y1="62"  x2="22" y2="62"  stroke="#d1d5db" stroke-width="1"/>
        <line x1="27" y1="112" x2="22" y2="112" stroke="#d1d5db" stroke-width="1"/>
        <line x1="27" y1="162" x2="22" y2="162" stroke="#d1d5db" stroke-width="1"/>
        <line x1="27" y1="212" x2="22" y2="212" stroke="#d1d5db" stroke-width="1"/>
        <defs>
          <linearGradient id="green-grad2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#4cc98a"/>
            <stop offset="100%" stop-color="#1a9e5c"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="thermo-target" id="deal-target">Target: <strong>198 deals</strong></div>
    <div class="thermo-title">Deals Closed Won</div>
  </div>

</div>

<p class="as-of" id="as-of">Loading data…</p>
<p class="error-msg" id="error-msg">Unable to load data. Please check the proxy URL.</p>

<script>
// ── CONFIG ─────────────────────────────────────────────────
// Replace with your deployed GAS Web App URL after publishing
var PROXY_URL = 'PASTE_YOUR_GAS_WEB_APP_URL_HERE';

// ── TUBE GEOMETRY ──────────────────────────────────────────
// Tube inner fill zone: y=12 (top) to y=272 (bottom of tube body)
// Total fillable height = 260px
var TUBE_BOTTOM = 272;
var TUBE_HEIGHT = 260;

// ── TICK LABELS ────────────────────────────────────────────
function buildTicks(containerId, target, isArr) {
  var el = document.getElementById(containerId);
  // 4 ticks at 25%, 50%, 75%, 100%
  [100, 75, 50, 25].forEach(function(pct) {
    var div = document.createElement('div');
    div.className = 'tick-label';
    var val = Math.round(target * pct / 100);
    div.textContent = isArr
      ? '$' + (val >= 1000000
          ? (val/1000000).toFixed(2) + 'M'
          : (val/1000).toFixed(0) + 'k')
      : val;
    el.appendChild(div);
  });
}

buildTicks('arr-ticks',  1968095, true);
buildTicks('deal-ticks', 198,     false);

// ── ANIMATION ──────────────────────────────────────────────
function animateFill(fillId, bulbId, pct) {
  var fill = document.getElementById(fillId);
  var bulb = document.getElementById(bulbId);
  var targetH = Math.round((pct / 100) * TUBE_HEIGHT);
  var targetY = TUBE_BOTTOM - targetH;
  var start   = null;
  var duration = 1600;

  // Bulb colour: green once any fill present
  if (pct > 0) {
    bulb.style.transition = 'fill 0.6s 0.4s';
    bulb.setAttribute('fill', '#1a9e5c');
  }

  function step(ts) {
    if (!start) start = ts;
    var elapsed  = ts - start;
    var progress = Math.min(elapsed / duration, 1);
    // Ease-out cubic
    var ease     = 1 - Math.pow(1 - progress, 3);
    var h        = Math.round(targetH * ease);
    var y        = TUBE_BOTTOM - h;
    fill.setAttribute('height', h);
    fill.setAttribute('y', y);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── FORMAT HELPERS ─────────────────────────────────────────
function fmtARR(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000)    return '$' + (n/1000).toFixed(1) + 'k';
  return '$' + n;
}

function fmtDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
  });
}

// ── LOAD DATA ──────────────────────────────────────────────
function loadData() {
  fetch(PROXY_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      // Remove shimmer
      ['arr-current','arr-pct','deal-current','deal-pct'].forEach(function(id) {
        document.getElementById(id).classList.remove('shimmer');
      });

      // ARR
      document.getElementById('arr-current').textContent = fmtARR(data.arr.current);
      document.getElementById('arr-pct').textContent     = data.arr.pct + '% of target';
      animateFill('arr-fill', 'arr-bulb', data.arr.pct);

      // Deals
      document.getElementById('deal-current').textContent = data.deals.current + ' deals';
      document.getElementById('deal-pct').textContent     = data.deals.pct + '% of target';
      animateFill('deal-fill', 'deal-bulb', data.deals.pct);

      // Timestamp
      document.getElementById('as-of').textContent = 'As of ' + fmtDate(data.asOf);
    })
    .catch(function(err) {
      console.error(err);
      document.getElementById('as-of').style.display   = 'none';
      document.getElementById('error-msg').style.display = 'block';
      // Remove shimmer on error
      ['arr-current','arr-pct','deal-current','deal-pct'].forEach(function(id) {
        document.getElementById(id).classList.remove('shimmer');
      });
    });
}

// Auto-refresh every 5 minutes
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
